server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-route
              uri: lb://AUTH-SERVICE
              predicates:
              - Path=/api/v1/auth/**
            - id: restaurant-service-route
              uri: lb://RESTAURANT-SERVICE
              predicates:
                - Path=/api/v1/restaurants/**, /api/v1/categories/**, /api/v1/items/**
eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true